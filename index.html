<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 🇺🇸 United Again, #CircleUp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Teko:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           #CircleUp — CINEMATIC PATRIOTIC WEBSITE
           ============================================ */

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0a1628;
            --navy-mid: #1a2744;
            --navy-light: #243456;
            --red: #b22234;
            --red-bright: #e8293b;
            --red-deep: #8b1a28;
            --white: #f5f0e8;
            --white-pure: #ffffff;
            --silver: #c0c0c0;
            --silver-light: #e0ddd5;
            --gold: #c9a84c;
            --gold-bright: #ffd700;
            --chrome: #8a8a8a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================
           BACKGROUND CANVAS — STARS & PARTICLES
           ============================================ */

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================
           PATRIOTIC STRIPE ACCENTS
           ============================================ */

        .flag-stripes-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            z-index: 100;
            background: repeating-linear-gradient(
                90deg,
                var(--red) 0px,
                var(--red) 33.33%,
                var(--white-pure) 33.33%,
                var(--white-pure) 66.66%,
                var(--navy-mid) 66.66%,
                var(--navy-mid) 100%
            );
        }

        .flag-stripes-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            z-index: 100;
            background: repeating-linear-gradient(
                90deg,
                var(--navy-mid) 0px,
                var(--navy-mid) 33.33%,
                var(--white-pure) 33.33%,
                var(--white-pure) 66.66%,
                var(--red) 66.66%,
                var(--red) 100%
            );
        }

        /* ============================================
           TEXTURE OVERLAY
           ============================================ */

        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* ============================================
           MAIN CONTENT WRAPPER
           ============================================ */

        .main-content {
            position: relative;
            z-index: 2;
        }

        /* ============================================
           SECTION 1: HERO BANNER
           ============================================ */

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 2rem 1rem;
        }

        /* Radial glow behind hero */
        .hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(
                ellipse at center,
                rgba(178, 34, 52, 0.08) 0%,
                rgba(26, 39, 68, 0.3) 40%,
                transparent 70%
            );
            z-index: -1;
        }

        /* Animated flag stripes behind hero text */
        .hero-flag-bg {
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            opacity: 0.04;
            z-index: -2;
            background: repeating-linear-gradient(
                0deg,
                var(--red) 0px,
                var(--red) 40px,
                transparent 40px,
                transparent 80px
            );
            animation: flagSlide 20s linear infinite;
        }

        @keyframes flagSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        /* Custom SVG Stars decoration above title */
        .hero-stars {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeSlideDown 1s ease-out 0.3s forwards;
        }

        .hero-stars svg {
            width: 24px;
            height: 24px;
            fill: var(--gold);
            filter: drop-shadow(0 0 6px rgba(201, 168, 76, 0.5));
        }

        /* Main Title */
        .hero-title {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-align: center;
            line-height: 1;
            opacity: 0;
            animation: heroReveal 1.2s ease-out 0.5s forwards;
        }

        .hero-title .line1 {
            font-size: clamp(2.2rem, 6.5vw, 5.5rem);
            letter-spacing: 0.08em;
            display: block;
            text-transform: uppercase;
            margin-bottom: 0.15em;
            background: linear-gradient(
                180deg,
                var(--white-pure) 0%,
                var(--silver) 50%,
                var(--white) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 30px rgba(255,255,255,0.15));
        }

        .hero-title .flag-emoji {
            font-size: 1.15em;
            display: inline-block;
            animation: flagWave 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
            -webkit-text-fill-color: initial;
            vertical-align: middle;
            margin: 0 0.05em;
            position: relative;
            top: -13px;
        }

        @keyframes flagWave {
            0%, 100% { transform: rotate(-3deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.05); }
        }

        .hero-title .line3 {
            font-size: clamp(2.5rem, 8vw, 7rem);
            letter-spacing: 0.08em;
            display: block;
            background: linear-gradient(
                180deg,
                var(--red-bright) 0%,
                var(--red) 50%,
                var(--red-deep) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 20px rgba(178, 34, 52, 0.5));
        }

        .hero-title .hash {
            color: var(--gold);
            -webkit-text-fill-color: var(--gold);
            text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
        }

        .hero-title .circle-white {
            background: linear-gradient(180deg, var(--white-pure) 0%, var(--silver) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-title .up-red {
            background: linear-gradient(180deg, var(--red-bright) 0%, var(--red) 50%, var(--red-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes heroReveal {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes fadeSlideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Custom chain separator below hero */
        .hero-chain-divider {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeSlideDown 1s ease-out 1.2s forwards;
        }

        .hero-chain-divider svg {
            width: min(600px, 90vw);
            height: 30px;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeSlideDown 1s ease-out 2s forwards;
        }

        .scroll-indicator svg {
            width: 32px;
            height: 32px;
            animation: scrollBounce 2s ease-in-out infinite;
        }

        @keyframes scrollBounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        /* ============================================
           SECTION 2: SCRIPTURE
           ============================================ */

        .scripture-section {
            padding: 6rem 2rem 3rem;
            text-align: center;
            position: relative;
        }

        .scripture-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
            opacity: 0.3;
        }

        .scripture-wrapper {
            max-width: 800px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .scripture-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scripture-ref {
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
        }

        .scripture-ref svg {
            display: inline-block;
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin: 0 0.8rem;
            fill: var(--gold);
        }

        .scripture-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.3rem, 3.5vw, 2.2rem);
            line-height: 1.6;
            color: var(--white);
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
            position: relative;
            padding: 0 2rem;
        }

        .scripture-text::before,
        .scripture-text::after {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--gold);
            opacity: 0.3;
            position: absolute;
            line-height: 1;
        }

        .scripture-text::before {
            content: '\201C';
            top: -0.3em;
            left: -0.2em;
        }

        .scripture-text::after {
            content: '\201D';
            bottom: -0.5em;
            right: -0.1em;
        }

        /* ============================================
           SECTION 3: MAIN IMAGE — THE CENTERPIECE
           ============================================ */

        .centerpiece-section {
            padding: 4rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Chain link border container */
        .chain-frame {
            position: relative;
            max-width: 750px;
            width: 90%;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chain-frame.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* SVG Chain border */
        .chain-border-svg {
            position: absolute;
            top: -25px;
            left: -25px;
            width: calc(100% + 50px);
            height: calc(100% + 50px);
            z-index: 2;
            pointer-events: none;
        }

        .chain-link-path {
            fill: none;
            stroke: var(--silver);
            stroke-width: 3;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: stroke-dashoffset 3s ease-out;
        }

        .chain-frame.visible .chain-link-path {
            stroke-dashoffset: 0;
        }

        /* Glow effect around image */
        .image-glow {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        .image-glow::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 14px;
            background: linear-gradient(
                45deg,
                var(--red) 0%,
                var(--gold) 25%,
                var(--white-pure) 50%,
                var(--gold) 75%,
                var(--red) 100%
            );
            background-size: 300% 300%;
            animation: glowRotate 4s ease-in-out infinite;
            z-index: -1;
            filter: blur(8px);
            opacity: 0.6;
        }

        .image-glow::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 13px;
            background: linear-gradient(
                45deg,
                var(--red),
                var(--gold),
                var(--silver),
                var(--gold),
                var(--red)
            );
            background-size: 400% 400%;
            animation: glowRotate 3s ease-in-out infinite reverse;
            z-index: -1;
        }

        @keyframes glowRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-image {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            box-shadow:
                0 0 40px rgba(178, 34, 52, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* Corner accent stars */
        .corner-star {
            position: absolute;
            z-index: 3;
            width: 36px;
            height: 36px;
            fill: var(--gold);
            filter: drop-shadow(0 0 8px rgba(201, 168, 76, 0.6));
            animation: starPulse 3s ease-in-out infinite;
        }

        .corner-star.tl { top: -18px; left: -18px; }
        .corner-star.tr { top: -18px; right: -18px; animation-delay: 0.75s; }
        .corner-star.bl { bottom: -18px; left: -18px; animation-delay: 1.5s; }
        .corner-star.br { bottom: -18px; right: -18px; animation-delay: 2.25s; }

        @keyframes starPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* ============================================
           SECTION 4: UNITED AS ONE
           ============================================ */

        .united-section {
            padding: 5rem 2rem 3rem;
            text-align: center;
            position: relative;
        }

        .united-title {
            font-family: 'Teko', sans-serif;
            font-weight: 700;
            font-size: clamp(3.5rem, 12vw, 10rem);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            line-height: 1;
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: inline-block;
        }

        .united-title.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .united-title .united-text {
            background: linear-gradient(
                180deg,
                var(--white-pure) 0%,
                #e8e4dc 30%,
                var(--silver) 60%,
                #a0a0a0 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 6px 30px rgba(255,255,255,0.1));
        }

        .united-title .exclaim {
            -webkit-text-fill-color: var(--red-bright);
            color: var(--red-bright);
            text-shadow: 0 0 30px rgba(232, 41, 59, 0.5);
        }

        /* Animated underline */
        .united-underline {
            width: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--red));
            margin: 1rem auto 0;
            border-radius: 2px;
            transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
        }

        .united-title.visible + .united-underline,
        .united-section.visible .united-underline {
            width: min(400px, 60vw);
        }

        /* Side chain decorations */
        .united-chains {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-top: -0.5rem;
        }

        .united-chains svg {
            width: 80px;
            height: 20px;
            opacity: 0.4;
        }

        /* ============================================
           SECTION 5: DEFINITION
           ============================================ */

        .definition-section {
            padding: 3rem 2rem 6rem;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .definition-card {
            max-width: 800px;
            width: 90%;
            background: linear-gradient(
                135deg,
                rgba(26, 39, 68, 0.9) 0%,
                rgba(10, 22, 40, 0.95) 100%
            );
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 16px;
            padding: 3rem 3.5rem;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s ease-out;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .definition-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Decorative stripe across top of card */
        .definition-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--red));
        }

        /* Background pattern */
        .definition-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: radial-gradient(
                circle at top right,
                rgba(201, 168, 76, 0.03) 0%,
                transparent 60%
            );
            pointer-events: none;
        }

        .definition-hashtag {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin-bottom: 1rem;
        }

        .definition-hashtag .hash-symbol {
            color: var(--gold);
            text-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .definition-hashtag .circle-text {
            background: linear-gradient(180deg, var(--white-pure), var(--silver));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .definition-hashtag .up-text {
            background: linear-gradient(180deg, var(--red-bright), var(--red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .definition-colon {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 0.8rem;
            letter-spacing: 0.08em;
        }

        .definition-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 400;
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            line-height: 1.7;
            color: var(--white);
            letter-spacing: 0.02em;
        }

        .definition-text strong {
            color: var(--gold);
            font-weight: 600;
        }

        /* Custom chain-link icon in definition */
        .def-chain-icon {
            display: inline-block;
            width: 28px;
            height: 18px;
            vertical-align: middle;
            margin: 0 0.3rem;
            position: relative;
            top: -2px;
        }

        .def-chain-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--gold);
            stroke-width: 2.5;
            display: block;
        }

        /* Star divider row */
        .star-divider {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 2rem;
            opacity: 0.4;
        }

        .star-divider svg {
            width: 12px;
            height: 12px;
            fill: var(--gold);
        }

        /* ============================================
           CUSTOM SVG DEFINITIONS (reusable)
           ============================================ */

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */

        @media (max-width: 768px) {
            .hero {
                padding: 4rem 1rem;
            }

            .scripture-text {
                padding: 0 0.5rem;
            }

            .scripture-text::before,
            .scripture-text::after {
                font-size: 2.5rem;
            }

            .definition-card {
                padding: 2rem 1.5rem;
            }

            .corner-star {
                width: 24px;
                height: 24px;
            }

            .corner-star.tl { top: -12px; left: -12px; }
            .corner-star.tr { top: -12px; right: -12px; }
            .corner-star.bl { bottom: -12px; left: -12px; }
            .corner-star.br { bottom: -12px; right: -12px; }

            .chain-border-svg {
                top: -15px;
                left: -15px;
                width: calc(100% + 30px);
                height: calc(100% + 30px);
            }

            .hero-stars {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title .line2 {
                letter-spacing: 0.02em;
            }

            .united-chains svg {
                width: 50px;
            }
        }

        /* ============================================
           PAGE LOAD ANIMATION
           ============================================ */

        .page-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            overflow: hidden;
        }

        .curtain-panel {
            flex: 1;
            background: var(--navy);
            transform-origin: top;
            animation: curtainReveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) 0.3s forwards;
        }

        .curtain-panel:nth-child(1) { animation-delay: 0.1s; background: var(--red-deep); }
        .curtain-panel:nth-child(2) { animation-delay: 0.2s; }
        .curtain-panel:nth-child(3) { animation-delay: 0.3s; background: var(--red-deep); }
        .curtain-panel:nth-child(4) { animation-delay: 0.4s; }

    <script>
        // ============================================
        // STAR PARTICLE BACKGROUND
        // ============================================
        (function() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            let animFrame;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createStars() {
                stars = [];
                const count = Math.floor((canvas.width * canvas.height) / 8000);
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2 + 0.3,
                        speed: Math.random() * 0.3 + 0.05,
                        opacity: Math.random() * 0.6 + 0.1,
                        pulse: Math.random() * Math.PI * 2,
                        pulseSpeed: Math.random() * 0.02 + 0.005,
                        // Some stars are gold, most are white/silver
                        color: Math.random() > 0.85
                            ? [201, 168, 76]
                            : Math.random() > 0.5
                                ? [192, 192, 192]
                                : [245, 240, 232]
                    });
                }
            }

            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const scrollY = window.scrollY;

                for (const star of stars) {
                    star.pulse += star.pulseSpeed;
                    const alpha = star.opacity * (0.5 + 0.5 * Math.sin(star.pulse));
                    const parallaxY = (star.y - scrollY * star.speed * 0.3 + canvas.height) % canvas.height;

                    ctx.beginPath();
                    ctx.arc(star.x, parallaxY, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${star.color[0]},${star.color[1]},${star.color[2]},${alpha})`;
                    ctx.fill();

                    // Add a subtle glow to larger stars
                    if (star.size > 1.5) {
                        ctx.beginPath();
                        ctx.arc(star.x, parallaxY, star.size * 3, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${star.color[0]},${star.color[1]},${star.color[2]},${alpha * 0.1})`;
                        ctx.fill();
                    }
                }

                animFrame = requestAnimationFrame(drawStars);
            }

            resize();
            createStars();
            drawStars();

            window.addEventListener('resize', () => {
                resize();
                createStars();
            });
        })();

        // ============================================
        // SCROLL-TRIGGERED ANIMATIONS
        // ============================================
        (function() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        // Don't unobserve so we don't re-trigger, but keep it simple
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '0px 0px -50px 0px'
            });

            document.querySelectorAll('[data-animate]').forEach(el => {
                observer.observe(el);
            });
        })();

        // ============================================
        // REMOVE CURTAIN AFTER ANIMATION
        // ============================================
        setTimeout(() => {
            const curtain = document.querySelector('.page-curtain');
            if (curtain) curtain.style.display = 'none';
        }, 2000);

        // ============================================
        // PARALLAX ON HERO (subtle)
        // ============================================
        (function() {
            const hero = document.querySelector('.hero');
            const heroTitle = document.querySelector('.hero-title');

            window.addEventListener('scroll', () => {
                const scrolled = window.scrollY;
                const heroHeight = hero.offsetHeight;
                if (scrolled < heroHeight) {
                    const progress = scrolled / heroHeight;
                    heroTitle.style.transform = `translateY(${scrolled * 0.15}px) scale(${1 - progress * 0.05})`;
                    heroTitle.style.opacity = 1 - progress * 0.8;
                }
            }, { passive: true });
        })();
    </script>
